x-app: &app
  image: ${APP_IMAGE:-devchat-api:latest}
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  env_file:
    - ${ENV_FILE:-.env.deploy}
  depends_on:
    postgres:
      condition: service_healthy
    mongodb:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_started
  networks:
    - chatnet

services:
  gateway:
    <<: *app
    command: ["node", "dist/apps/gateway/apps/gateway/src/main.js"]
    ports:
      - "${GATEWAY_PORT:-3088}:3088"

  auth:
    <<: *app
    command: ["node", "dist/apps/auth/apps/auth/src/main.js"]

  chat:
    <<: *app
    command: ["node", "dist/apps/chat/apps/chat/src/main.js"]

  upload:
    <<: *app
    command: ["node", "dist/apps/upload/apps/upload/src/main.js"]

  github:
    <<: *app
    command: ["node", "dist/apps/githubapi/apps/githubapi/src/main.js"]

  notifications:
    <<: *app
    command: ["node", "dist/apps/notifications/apps/notifications/src/main.js"]

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dev_chat}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-dev_chat}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - chatnet

  mongodb:
    image: mongo:7-jammy
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-dev_chat}
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongodb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - chatnet

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - chatnet

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - chatnet

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - chatnet

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    restart: unless-stopped
    profiles: ["tools"]
    ports:
      - "${KAFDROP_PORT:-9000}:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
      JVM_OPTS: "-Xms32M -Xmx128M"
    depends_on:
      - kafka
    networks:
      - chatnet

volumes:
  postgres_data:
  mongodb_data:
  redis_data:

networks:
  chatnet:
    driver: bridge
